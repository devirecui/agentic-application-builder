anthropic:
  model: "claude-sonnet-4-6"
  max_tokens: 4000

apply:
  headless: false
  slow_mo: 50
  screenshot_on_error: true
  manual_fallback: true
  timeout: 30000

tracker:
  path: "data/applications.json"

logging:
  level: "INFO"
  output_dir: "output/logs"

discovery:
  run_every_hours: 24
  searches:
    - query: '"Cloud Solution Architect" "Azure AI" remote'
      location: "remote"
      min_match_score: 50
    - query: '"Partner Technical Specialist" Microsoft remote'
      location: "remote"
      min_match_score: 50
    - query: '"AI Architect" "Azure OpenAI" remote'
      location: "remote"
      min_match_score: 50
    - query: '"Agentic AI" architect remote'
      location: "remote"
      min_match_score: 50
    - query: '"AI Platform" architect "co-sell" remote'
      location: "remote"
      min_match_score: 50
    - query: '"Hyperscaler" AI architect remote'
      location: "remote"
      min_match_score: 50
